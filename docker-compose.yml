version: '3.8'
services:
  app:
    build: .
    command: npm run dev  # This line is changed to use Nodemon
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=development
    env_file:
      - .env
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules

volumes:
  db-data:
